<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SafePaws Admin V2.3</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:#e5e7eb}
/* LOGIN SCREEN */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)}
.login-card{background:#1e293b;padding:32px;border-radius:16px;box-shadow:0 8px 24px #0005;width:90%;max-width:380px;border:1px solid #334155}
.login-card h1{display:flex;align-items:center;gap:10px;font-size:24px;margin:0 0 20px;justify-content:center}
.login-card input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb;font-size:16px}
.login-card button{width:100%;padding:14px;margin-top:12px;border:0;border-radius:10px;background:#38bdf8;color:#0f172a;font-weight:bold;font-size:16px;cursor:pointer}
/* APP SCREEN */
#appScreen{display:none}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:0}
header h1{display:flex;align-items:center;gap:8px;font-size:20px;margin:0}
.logout{background:#dc2626;border:0;color:#fff;padding:8px 14px;border-radius:8px;font-weight:bold;cursor:pointer}
main{padding:20px;padding-bottom:80px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-weight:600;font-size:12px;text-transform:uppercase}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold}
.pending{background:#f59e0b;color:#000}.approved{background:#16a34a}.rejected{background:#dc2626}
.btn{padding:8px 12px;border:0;border-radius:8px;font-weight:bold;cursor:pointer;margin-right:6px}
.btn-green{background:#16a34a;color:#fff}.btn-red{background:#dc2626;color:#fff}
nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex}
nav button{flex:1;padding:12px 4px;background:0;border:0;color:#94a3b8;font-size:12px;cursor:pointer}
nav button.active{color:#38bdf8;background:#0f172a}
.tab{display:none}.tab.active{display:block}
.notif-dot{background:#dc2626;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;margin-left:4px;vertical-align:top}
</style>
</head>
<body>

<!-- SCREEN 1: LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🛡️ SafePaws Admin</h1>
    <input id="email" type="email" placeholder="Email" value="gabinessheabert@gmail.com">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SCREEN 2: APP -->
<div id="appScreen">
<header>
  <h1 id="headerTitle">🚚 Drivers</h1>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<main>
  <div id="driversTab" class="tab active">
    <div class="card"><table><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="driversTable"></tbody></table></div>
  </div>

  <div id="vetsTab" class="tab">
    <div class="card"><table><thead><tr><th>Clinic</th><th>License</th><th>Status</th><th>Action</th></tr></thead><tbody id="vetsTable"></tbody></table></div>
  </div>

  <div id="approvalTab" class="tab">
    <div class="card">
      <h3 style="margin-top:0">📝 Pending Applications</h3>
      <div id="approvalList">Loading...</div>
    </div>
  </div>

  <div id="groomTab" class="tab">
    <div class="card"><table><thead><tr><th>Salon</th><th>License</th><th>Status</th><th>Action</th></tr></thead><tbody id="groomTable"></tbody></table></div>
  </div>

  <div id="earnTab" class="tab">
    <div class="card"><h3>💰 Earnings Report</h3><p>Coming soon...</p></div>
  </div>
</main>

<nav>
  <button class="active" onclick="switchTab('driversTab',this,'🚚 Drivers')">🚚<br>Drivers</button>
  <button onclick="switchTab('vetsTab',this,'🩺 Vets')">🩺<br>Vets</button>
  <button onclick="switchTab('approvalTab',this,'📝 Approval')"><span style="position:relative">📝<span id="notifBadge" class="notif-dot" style="display:none">0</span></span><br>Approval</button>
  <button onclick="switchTab('groomTab',this,'✂️ Groom')">✂️<br>Groom</button>
  <button onclick="switchTab('earnTab',this,'💰 Earn')">💰<br>Earn</button>
</nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// PALITAN MO TO NG FIREBASE CONFIG MO
const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth,user=>{
  if(user){document.getElementById('loginScreen').style.display='none';document.getElementById('appScreen').style.display='block';}
  else{document.getElementById('loginScreen').style.display='flex';document.getElementById('appScreen').style.display='none';}
});

async function login(){
  const e=document.getElementById('email').value;
  const p=document.getElementById('pass').value;
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(err){alert(err.message);}
}
window.login=login;
window.logout=()=>signOut(auth);

function switchTab(id,btn,title){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('headerTitle').textContent=title;
}
window.switchTab=switchTab;

// DRIVERS TAB
onSnapshot(collection(db,'riders'),snap=>{
  let html='';
  snap.forEach(d=>{
    const r=d.data();
    html+=`<tr><td>${r.name||'-'}</td><td>${r.plate||'-'}</td><td><span class="badge ${r.status}">${r.status}</span></td><td>${r.status==='pending'?`<button class="btn btn-green" onclick="approve('${d.id}','riders')">Approve</button>`:''}</td></tr>`;
  });
  document.getElementById('driversTable').innerHTML=html||'<tr><td colspan=4>No drivers</td></tr>';
});

// VETS TAB
onSnapshot(collection(db,'vets'),snap=>{
  let html='';
  snap.forEach(d=>{
    const v=d.data();
    html+=`<tr><td>${v.clinicName||v.name||'-'}</td><td>${v.license||'-'}</td><td><span class="badge ${v.status}">${v.status}</span></td><td>${v.status==='pending'?`<button class="btn btn-green" onclick="approve('${d.id}','vets')">Approve</button>`:''}</td></tr>`;
  });
  document.getElementById('vetsTable').innerHTML=html||'<tr><td colspan=4>No vets</td></tr>';
});

// GROOM TAB
onSnapshot(collection(db,'groomers'),snap=>{
  let html='';
  snap.forEach(d=>{
    const g=d.data();
    html+=`<tr><td>${g.salonName||g.name||'-'}</td><td>${g.license||'-'}</td><td><span class="badge ${g.status}">${g.status}</span></td><td>${g.status==='pending'?`<button class="btn btn-green" onclick="approve('${d.id}','groomers')">Approve</button>`:''}</td></tr>`;
  });
  document.getElementById('groomTable').innerHTML=html||'<tr><td colspan=4>No groomers</td></tr>';
});

// APPROVAL TAB
async function loadApproval(){
  let html=''; let count=0;
  const cols=[{col:'riders',role:'Rider',icon:'🚚'},{col:'vets',role:'Vet',icon:'🩺'},{col:'groomers',role:'Groomer',icon:'✂️'}];
  for(const {col,role,icon} of cols){
    const snap=await getDocs(query(collection(db,col), where("status","==","pending")));
    count+=snap.size;
    snap.forEach(d=>{
      const u=d.data();
      html+=`<div class="card">${icon} <b>${u.name||u.clinicName||u.salonName}</b> - ${u.email}<br><small>${role} | ${u.phone||''} ${u.plate||u.license? '| '+u.plate||u.license:''}</small><br><br><button class="btn btn-green" onclick="approve('${d.id}','${col}')">✅ Approve</button><button class="btn btn-red" onclick="reject('${d.id}','${col}')">❌ Reject</button></div>`;
    });
  }
  document.getElementById('approvalList').innerHTML=html||'No pending applications';
  const badge=document.getElementById('notifBadge');
  badge.style.display=count>0?'inline':'none';
  badge.textContent=count;
}
setInterval(loadApproval,3000);
loadApproval();

window.approve=async(id,col)=>{ await updateDoc(doc(db,col,id),{status:'approved'}); loadApproval(); }
window.reject=async(id,col)=>{ await updateDoc(doc(db,col,id),{status:'rejected'}); loadApproval(); }
</script>
</body></html>
