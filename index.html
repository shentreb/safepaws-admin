<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePaws Admin V2.2</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ========== FIREBASE CONFIG - GALING SA PIC MO ========== */
const firebaseConfig = { 
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os", // <- DITO LANG BOI. PASTE MO API KEY MO
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};
/* ======================================================== */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ========== EMAIL MO DITO ========== */
const ADMIN_EMAIL = "gabinessheabert@gmail.com"; // <- EMAIL MO DITO BOI
/* =================================== */

onAuthStateChanged(auth, user => { 
  document.getElementById('loginDiv').style.display = user? 'none' : 'block'; 
  document.getElementById('appDiv').style.display = user? 'block' : 'none'; 
  if(user) loadData(); 
});

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('email').value = ADMIN_EMAIL;
});

document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
document.getElementById('logoutBtn').onclick = () => signOut(auth);

document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => { 
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
  btn.classList.add('active'); 
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
  document.getElementById(btn.dataset.tab).classList.add('active'); 
});

document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.onclick = () => { 
  const parent = btn.closest('.tab-content'); 
  parent.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active')); 
  btn.classList.add('active'); 
  parent.querySelectorAll('.sub-content').forEach(c => c.classList.remove('active')); 
  parent.querySelector('#'+btn.dataset.sub).classList.add('active'); 
});

function driverRow(d) { return `<tr><td>${d.name||''}</td><td>${d.plateNumber||'-'}</td><td>${d.status}</td><td>${d.status==='pending'?`<button class="approve" data-id="${d.id}">Approve</button> <button class="reject" data-id="${d.id}">Reject</button>`:`<button class="reject" data-id="${d.id}">Deactivate</button>`}</td></tr>`; }
function vetRow(d) { return `<tr><td>${d.clinicName||''}</td><td>-</td><td>${d.status}</td><td>${d.status==='pending'?`<button class="approve" data-id="${d.id}" data-col="vets">Approve</button> <button class="reject" data-id="${d.id}" data-col="vets">Reject</button>`:`<button class="reject" data-id="${d.id}" data-col="vets">Deactivate</button>`}</td></tr>`; }
function groomRow(d) { return `<tr><td>${d.shopName||''}</td><td>-</td><td>${d.status}</td><td>${d.status==='pending'?`<button class="approve" data-id="${d.id}" data-col="groomers">Approve</button> <button class="reject" data-id="${d.id}" data-col="groomers">Reject</button>`:`<button class="reject" data-id="${d.id}" data-col="groomers">Deactivate</button>`}</td></tr>`; }

function loadData() {
  onSnapshot(collection(db, "drivers"), snap => {
    document.getElementById('driversNewBody').innerHTML = snap.docs.filter(d=>d.data().status==='pending').map(d=>driverRow({id:d.id,...d.data()})).join('') || '<tr><td colspan="4">No new drivers</td></tr>';
    document.getElementById('driversApprovedBody').innerHTML = snap.docs.filter(d=>d.data().status==='approved').map(d=>driverRow({id:d.id,...d.data()})).join('') || '<tr><td colspan="4">No approved drivers</td></tr>';
  });
  onSnapshot(collection(db, "vets"), snap => {
    document.getElementById('vetsNewBody').innerHTML = snap.docs.filter(d=>d.data().status==='pending').map(d=>vetRow({id:d.id,...d.data()})).join('') || '<tr><td colspan="4">No new vets</td></tr>';
    document.getElementById('vetsApprovedBody').innerHTML = snap.docs.filter(d=>d.data().status==='approved').map(d=>vetRow({id:d.id,...d.data()})).join('') || '<tr><td colspan="4">No approved vets</td></tr>';
  });
  onSnapshot(collection(db, "groomers"), snap => {
    document.getElementById('groomNewBody').innerHTML = snap.docs.filter(d=>d.data().status==='pending').map(d=>groomRow({id:d.id,...d.data()})).join('') || '<tr><td colspan="4">No new groomers</td></tr>';
    document.getElementById('groomApprovedBody').innerHTML = snap.docs.filter(d=>d.data().status==='approved').map(d=>groomRow({id:d.id,...d.data()})).join('') || '<tr><td colspan="4">No approved groomers</td></tr>';
  });
  onSnapshot(collection(db, "earnings"), snap => { 
    document.getElementById('earningsBody').innerHTML = snap.empty?'<tr><td colspan="2">No earnings</td></tr>':snap.docs.map(d=>`<tr><td>₱${d.data().amount}</td><td>${d.data().driverName||d.data().clinicName||d.data().shopName}</td></tr>`).join('') 
  });
}

document.addEventListener('click', async e => {
  if(e.target.classList.contains('approve')) await updateDoc(doc(db, 'drivers', e.target.dataset.id), {status: 'approved'});
  if(e.target.classList.contains('reject') &&!e.target.dataset.col) await updateDoc(doc(db, 'drivers', e.target.dataset.id), {status: 'rejected'});
  if(e.target.dataset.col) await updateDoc(doc(db, e.target.dataset.col, e.target.dataset.id), {status: e.target.classList.contains('approve')?'approved':'rejected'});
});
</script>
<style>
body{font-family:system-ui;background:#0f1117;color:#e6e6e6;margin:0;padding:16px;padding-bottom:80px}
table{width:100%;border-collapse:collapse;background:#1a1d24;border-radius:12px;overflow:hidden;margin-top:12px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #2a2f3a}
th{background:#2a2f3a}
input,button{padding:10px;margin:4px;border-radius:8px;border:1px solid #2a2f3a;background:#1a1d24;color:#e6e6e6}
button{background:#4a5af9;border:0;font-weight:700;cursor:pointer}
input[readonly]{background:#2a2f3a;color:#9aa0a6;cursor:not-allowed}
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#1a1d24;border-top:1px solid #2a2f3a}
.tab-btn{flex:1;padding:14px;background:transparent;border:0;color:#9aa0a6;font-size:14px}
.tab-btn.active{color:#4a5af9;font-weight:700}
.tab-content{display:none}.tab-content.active{display:block}
.approve{background:#22c55e}.reject{background:#ef4444}
.sub-tab-bar{display:flex;gap:8px;margin:12px 0}
.sub-tab-btn{flex:1;padding:10px;background:#1a1d24;border:1px solid #2a2f3a;border-radius:8px;font-size:14px}
.sub-tab-btn.active{background:#4a5af9}
.sub-content{display:none}.sub-content.active{display:block}
</style>
</head>
<body>
<div id="loginDiv">
  <h2>Admin Login</h2>
  <input id="email" type="email" placeholder="Email" readonly>
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="appDiv" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center">
  <h2>SafePaws Admin V2.2</h2>
  <button id="logoutBtn" style="width:auto;background:#ef4444">Logout</button>
</div>

<div id="driversTab" class="tab-content active">
  <h2>🚚 Drivers</h2>
  <div class="sub-tab-bar"><button class="sub-tab-btn active" data-sub="driversNew">New</button><button class="sub-tab-btn" data-sub="driversApproved">Approved</button></div>
  <table id="driversNew" class="sub-content active"><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="driversNewBody"></tbody></table>
  <table id="driversApproved" class="sub-content"><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="driversApprovedBody"></tbody></table>
</div>

<div id="vetsTab" class="tab-content">
  <h2>🏥 Vets</h2>
  <div class="sub-tab-bar"><button class="sub-tab-btn active" data-sub="vetsNew">New</button><button class="sub-tab-btn" data-sub="vetsApproved">Approved</button></div>
  <table id="vetsNew" class="sub-content active"><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="vetsNewBody"></tbody></table>
  <table id="vetsApproved" class="sub-content"><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="vetsApprovedBody"></tbody></table>
</div>

<div id="groomTab" class="tab-content">
  <h2>✂️ Groom</h2>
  <div class="sub-tab-bar"><button class="sub-tab-btn active" data-sub="groomNew">New</button><button class="sub-tab-btn" data-sub="groomApproved">Approved</button></div>
  <table id="groomNew" class="sub-content active"><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="groomNewBody"></tbody></table>
  <table id="groomApproved" class="sub-content"><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="groomApprovedBody"></tbody></table>
</div>

<div id="earningsTab" class="tab-content">
  <h2>💰 Earn</h2>
  <table><thead><tr><th>Amount</th><th>Name</th></tr></thead><tbody id="earningsBody"></tbody></table>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="driversTab">🚚 Drivers</button>
  <button class="tab-btn" data-tab="vetsTab">🏥 Vets</button>
  <button class="tab-btn" data-tab="groomTab">✂️ Groom</button>
  <button class="tab-btn" data-tab="earningsTab">💰 Earn</button>
</div>
</div>
</body></html>
